name: Automatic API testing

on:
  push:
    branches:
      - master

  pull_request:
    branches:
      - master

  workflow_dispatch:

jobs:
  automatic-tests:
    name: Run TeaPie tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install TeaPie
        run: dotnet tool install --global TeaPie.Tool

      - name: Add .NET tools to PATH
        run: echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4.2

      - name: Build API image
        uses: docker/build-push-action@v7.3
        with:
          context: ./Docker
          file: ./Docker/Dockerfile
          load: true
          tags: apikros-api:ci
          build-args: |
            UID=1000
            GID=1000
          cache-from: type=gha,scope=apikros-api
          cache-to: type=gha,mode=max,scope=apikros-api

      - name: Start Docker services
        run: |
          docker compose \
            -f ./Docker/docker-compose.ci.yml \
            up --detach --no-build

      - name: Wait for API
        run: |
          for attempt in {1..60}; do
            if curl --fail --silent http://localhost:8080/health > /dev/null; then
              echo "API is ready."
              exit 0
            fi

            echo "Waiting for API: ${attempt}/60"
            sleep 2
          done

          echo "API did not become ready."

          docker compose \
            -f ./Docker/docker-compose.ci.yml \
            ps

          docker compose \
            -f ./Docker/docker-compose.ci.yml \
            logs

          exit 1
          
      - name: Create database
        run: |
          docker compose \
            -f ./Docker/docker-compose.ci.yml \
            exec -T api \
            dotnet ef database update
      
      - name: Run TeaPie tests
        run: teapie test ./src/Tests

      - name: Show Docker logs
        if: failure()
        run: |
          docker compose \
            -f ./Docker/docker-compose.ci.yml \
            logs

      - name: Stop Docker services
        if: always()
        run: |
          docker compose \
            -f ./Docker/docker-compose.ci.yml \
            down --volumes --remove-orphans