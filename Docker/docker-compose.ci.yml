services:
  api:
    image: apikros-api:ci
    build:
      context: ./Docker
      dockerfile: Dockerfile
      args:
        UID: 1000
        GID: 1000

    ports:
      - "127.0.0.1:8080:8080"

    environment:
      ASPNETCORE_ENVIRONMENT: Testing
      DB_HOST: sqlserver
      DB_PORT: 1433
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_TRUST_CERTIFICATE: ${DB_TRUST_CERTIFICATE}

    depends_on:
      sqlserver:
        condition: service_healthy

    networks:
      - app_network

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl --fail http://localhost:8080/health || exit 1"
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2025-latest

    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${DB_PASSWORD}
      MSSQL_PID: Developer

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" || exit 1"
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

    networks:
      - app_network

networks:
  app_network:
    driver: bridge